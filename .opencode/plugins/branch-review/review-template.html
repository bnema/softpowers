<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Superpowers Branch Review</title>
    <script>
      (() => {
        try {
          const storage = window.localStorage
          const saved = storage.getItem("superpowers:review:theme")
          const theme = saved === "dark" || saved === "light"
            ? saved
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
          document.documentElement.dataset.theme = theme
          document.documentElement.style.colorScheme = theme
        } catch {}
      })()
    </script>
    <link rel="stylesheet" href="/review-styles.css">
  </head>
  <body>
    <header id="review-toolbar"></header>
    <aside id="file-list"></aside>
    <main>
      <section id="diff-view"></section>
      <section id="draft-editor"></section>
    </main>
    <script id="review-bootstrap" type="application/json">{{BOOTSTRAP_JSON}}</script>
    <script type="module" src="/review-client.js"></script>
  </body>
</html>
